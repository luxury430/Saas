<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neuroforge Premium Chat UI</title>
 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8fafc;
      padding: 20px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 850px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    /* --- Sidebar & Brand --- */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: rgba(15, 23, 42, 0.4);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .brand {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      letter-spacing: 1px;
    }

    .brand i { color: #818cf8; font-size: 24px; }

    .sidebar-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-list { flex: 1; overflow-y: auto; padding: 12px; }
    /* Scrollbar styling */
    .user-list::-webkit-scrollbar, .chat-messages::-webkit-scrollbar { width: 6px; }
    .user-list::-webkit-scrollbar-thumb, .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .user {
      display: flex;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .user:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
    .user.active { background: rgba(99, 102, 241, 0.15); border-left: 4px solid #818cf8; }

    .avatar img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .user-info { margin-left: 16px; flex: 1; overflow: hidden; }
    .user-info h3 { font-size: 15px; font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .user-info p { font-size: 13px; color: #94a3b8; margin-top: 4px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .time { font-size: 12px; color: #64748b; white-space: nowrap; }

    /* --- Chat Area --- */
    .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: rgba(255,255,255,0.01); min-width: 0; }

    .chat-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .header-user { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
      cursor: pointer; 
      padding: 8px; 
      border-radius: 12px; 
      transition: background 0.2s;
       outline: none;
-webkit-tap-highlight-color: transparent;
    }
    .header-user:hover { background: rgba(255,255,255,0.05); }
    .status-text { font-size: 12px; color: #94a3b8; }
    .status-text.online { color: #4ade80; }

    .back-btn { display: none; margin-right: 8px; font-size: 20px; color: #f8fafc; }

    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* --- Message Bubbles --- */
    .message { max-width: 75%; display: flex; flex-direction: column; }
    .message.received { align-self: flex-start; }
    .message.sent { align-self: flex-end; align-items: flex-end; }
    .bubble { padding: 14px 18px; font-size: 14.5px; line-height: 1.5; border-radius: 20px; word-wrap: break-word; }
    .received .bubble { background: rgba(255, 255, 255, 0.08); border-bottom-left-radius: 4px; }
    .sent .bubble { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-bottom-right-radius: 4px; }
    .timestamp { font-size: 11px; color: #64748b; margin-top: 6px; }

    /* --- Input Area --- */
    .chat-input-area { padding: 20px 24px; display: flex; align-items: center; gap: 16px; background: rgba(15, 23, 42, 0.4); }
    .input-wrapper {
      flex: 1; display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
      border-radius: 30px; padding: 0 16px; border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-wrapper input { flex: 1; background: transparent; border: none; padding: 16px 0; color: white; outline: none; font-size: 15px; }

    .icon-btn { background: transparent; border: none; color: #94a3b8; font-size: 18px; cursor: pointer; transition: color 0.2s;  outline: none;
-webkit-tap-highlight-color: transparent;}
    .icon-btn:hover { color: #f8fafc; }
    .send-btn {
      background: #6366f1; border: none; width: 48px; height: 48px; min-width: 48px; border-radius: 50%;
      color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s, background 0.2s;
    }
    .send-btn:hover { background: #4f46e5; transform: scale(1.05); }

    /* --- Typing Indicator --- */
    .typing-indicator { display: none; padding: 0 24px 10px; align-items: center; gap: 4px; }
    .typing-indicator.active { display: flex; }
    .typing-indicator span { width: 6px; height: 6px; background: #818cf8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    /* --- Profile Modal --- */
    .profile-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
      backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease; outline: none;
-webkit-tap-highlight-color: transparent;
    }
    .profile-modal.active { display: flex; opacity: 1; }
    .profile-content {
      background: #1e293b; padding: 40px 32px; border-radius: 24px; width: 90%; max-width: 400px;
      text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transform: translateY(20px); transition: transform 0.3s ease; outline: none;
-webkit-tap-highlight-color: transparent;
    }
    .profile-modal.active .profile-content { transform: translateY(0); }
    .profile-content img { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 16px; object-fit: cover; border: 4px solid #4f46e5; outline: none;
-webkit-tap-highlight-color: transparent; }
    .profile-content h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .profile-content #profile-email { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    .profile-info { text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .profile-info p { margin-bottom: 12px; font-size: 14px; line-height: 1.5; color: #cbd5e1; }
    .profile-info p:last-child { margin-bottom: 0; }
    .profile-info strong { color: #818cf8; font-weight: 500; display: inline-block; width: 90px; outline: none;
-webkit-tap-highlight-color: transparent; }
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: none; color: #94a3b8; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: all 0.2s; }
    .close-btn:hover { background: rgba(255,255,255,0.1); color: #fff;  outline: none;
-webkit-tap-highlight-color: transparent;}

    /* --- Animations --- */
    @keyframes slideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideLeft { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .slide-right { animation: slideRight 0.3s ease-out; }
    .slide-left { animation: slideLeft 0.3s ease-out; }

    /* --- Responsive Mobile View --- */
    @media (max-width: 768px) {
      body { padding: 0; background: #0f172a; }
      .chat-wrapper { height: 100vh; max-height: 100vh; border-radius: 0; border: none; flex-direction: column; }
      .sidebar { width: 100%; flex: 1; border-right: none; }
      .chat-area { display: none; width: 100%; flex: 1; }
      
      /* Toggle classes via JS for mobile navigation */
      .chat-wrapper.mobile-chat-active .sidebar { display: none; }
      .chat-wrapper.mobile-chat-active .chat-area { display: flex; }
      
      .back-btn { display: block; }
      .message { max-width: 85%; }
    }
    /* Light Theme Overrides */
body.light-mode {
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  color: #0f172a;
}
body.light-mode .chat-wrapper { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 0, 0, 0.1); }
body.light-mode .sidebar { background: rgba(241, 245, 249, 0.6); border-right: 1px solid rgba(0, 0, 0, 0.05); }
body.light-mode .brand, body.light-mode .sidebar-header h2, body.light-mode .user-info h3, body.light-mode #header-name { color: #0f172a; }
body.light-mode .chat-area { background: rgba(0, 0, 0, 0.01); }
body.light-mode .chat-header { background: rgba(0, 0, 0, 0.02); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
body.light-mode .chat-input-area { background: rgba(241, 245, 249, 0.6); }
body.light-mode .input-wrapper { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.1); }
body.light-mode .input-wrapper input { color: #0f172a; }
body.light-mode .received .bubble { background: #f1f5f9; color: #0f172a; }
body.light-mode .profile-content { background: #ffffff; color: #0f172a; border: 1px solid rgba(0,0,0,0.1); }
.search-bar {
  margin: 0 24px 16px;
  padding: 10px 16px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #94a3b8;
}
.search-bar input {
  background: transparent;
  border: none;
  color: white;
  outline: none;
  width: 100%;
  font-size: 14px;
}
body.light-mode .search-bar { background: rgba(0, 0, 0, 0.05); }
body.light-mode .search-bar input { color: #0f172a; }
.emoji-picker {
  display: none;
  position: absolute;
  bottom: 90px;
  right: 80px;
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
  z-index: 10;
   outline: none;
-webkit-tap-highlight-color: transparent;
}
.emoji-picker.active { display: grid; }
.emoji { font-size: 22px; cursor: pointer; text-align: center; transition: transform 0.2s; user-select: none; }
.emoji:hover { transform: scale(1.2); }
body.light-mode .emoji-picker { background: #ffffff; border: 1px solid rgba(0,0,0,0.1); }
.delete-chat-btn:hover { color: #ef4444 !important; }

  </style>
</head>
<body>

  <div class="chat-wrapper" id="chat-wrapper">
    <aside class="sidebar">
     <div class="brand" style="justify-content: space-between; width: 100%;">
  <div style="display: flex; align-items: center; gap: 12px;">
    <i class="fas fa-brain"></i>
    <span>NEUROFORGE</span>
  </div>
  <button class="icon-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
</div>


   <div class="search-bar">
  <i class="fas fa-search"></i>
  <input type="text" id="user-search" placeholder="Search messages...">
</div>

      <div class="user-list" id="user-list">
        <div class="user active" data-id="1">
          <div class="avatar"><img src="https://i.pravatar.cc/150?u=1" alt="Support"></div>
          <div class="user-info">
            <h3 class="user-name">Support Team</h3>
            <p>Got it! Anything else?</p>
          </div>
          <span class="time">Just now</span>
        </div>
        
        <div class="user" data-id="2">
          <div class="avatar"><img src="https://i.pravatar.cc/150?u=2" alt="John"></div>
          <div class="user-info">
            <h3 class="user-name">John Doe</h3>
            <p>Sounds good!</p>
          </div>
          <span class="time">10:42 AM</span>
        </div>
        
        <div class="user" data-id="3">
          <div class="avatar"><img src="https://i.pravatar.cc/150?u=3" alt="Alex"></div>
          <div class="user-info">
            <h3 class="user-name">Alex Smith</h3>
            <p>Sent a file</p>
          </div>
          <span class="time">Yesterday</span>
        </div>
      </div>
    </aside>

    <main class="chat-area">
      <header class="chat-header">
        <div class="header-user" id="profile-trigger">
          <button class="icon-btn back-btn" id="back-btn"><i class="fas fa-chevron-left"></i></button>
          <div class="avatar"><img id="header-avatar" src="https://i.pravatar.cc/150?u=1" alt="Avatar"></div>
          <div>
            <h3 id="header-name">Support Team</h3>
            <span class="status-text online" id="header-status">Online</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" style="margin-right: 15px;"><i class="fas fa-phone"></i></button>
          <button class="icon-btn" style="margin-right: 15px;"><i class="fas fa-video"></i></button>
          <button class="icon-btn delete-chat-btn" id="delete-chat-btn" title="Clear Chat" style="margin-right: 15px;"><i class="fas fa-trash"></i></button>

          <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
        </div>
      </header>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="typing-indicator" id="typing-indicator">
        <span></span><span></span><span></span>
      </div>
<button class="icon-btn" id="emoji-btn"><i class="far fa-smile"></i></button>
<div class="emoji-picker" id="emoji-picker">
  <span class="emoji">😀</span><span class="emoji">😂</span><span class="emoji">❤️</span><span class="emoji">👍</span><span class="emoji">🔥</span><span class="emoji">🎉</span><span class="emoji">😎</span><span class="emoji">🤔</span>
</div>

      <footer class="chat-input-area">
        <button class="icon-btn"><i class="fas fa-paperclip"></i></button>
        <div class="input-wrapper">
          <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
          <button class="icon-btn"><i class="far fa-smile"></i></button>
        </div>
        <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
      </footer>
    </main>
  </div>

  <div class="profile-modal" id="profile-modal">
    <div class="profile-content">
      <button class="close-btn" id="close-profile"><i class="fas fa-times"></i></button>
      <img id="modal-img" src="" alt="Profile">
      <h2 id="modal-name">Name</h2>
      <p id="modal-email">email</p>
      <div class="profile-info">
        <p><strong>Bio:</strong> <span id="modal-bio">...</span></p>
        <p><strong>Status:</strong> <span id="modal-last-online">...</span></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const messageInput = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      const chatMessages = document.getElementById('chat-messages');
      const typingIndicator = document.getElementById('typing-indicator');
      const userItems = document.querySelectorAll('.user');
      const headerName = document.getElementById('header-name');
      const headerAvatar = document.getElementById('header-avatar');
      const headerStatus = document.getElementById('header-status');
      
      const chatWrapper = document.getElementById('chat-wrapper');
      const backBtn = document.getElementById('back-btn');
      
      const profileTrigger = document.getElementById('profile-trigger');
      const profileModal = document.getElementById('profile-modal');
      const closeProfileBtn = document.getElementById('close-profile');

      let activeUserId = "1";
const themeToggle = document.getElementById('theme-toggle');
themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const icon = themeToggle.querySelector('i');
  if (document.body.classList.contains('light-mode')) {
    icon.classList.replace('fa-moon', 'fa-sun');
  } else {
    icon.classList.replace('fa-sun', 'fa-moon');
  }
});
const userSearch = document.getElementById('user-search');
userSearch.addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  userItems.forEach(user => {
    const name = user.querySelector('.user-name').innerText.toLowerCase();
    user.style.display = name.includes(term) ? 'flex' : 'none';
  });
});
const emojiBtn = document.getElementById('emoji-btn');
const emojiPicker = document.getElementById('emoji-picker');
const emojis = document.querySelectorAll('.emoji');

// Toggle picker visibility
emojiBtn.addEventListener('click', (e) => {
  e.preventDefault();
  emojiPicker.classList.toggle('active');
});

// Append emoji to input
emojis.forEach(emoji => {
  emoji.addEventListener('click', (e) => {
    messageInput.value += e.target.innerText;
    emojiPicker.classList.remove('active');
    messageInput.focus();
  });
});

// Close picker when clicking outside
document.addEventListener('click', (e) => {
  if (!emojiBtn.contains(e.target) && !emojiPicker.contains(e.target)) {
    emojiPicker.classList.remove('active');
  }
});

const deleteChatBtn = document.getElementById('delete-chat-btn');

deleteChatBtn.addEventListener('click', () => {
  if (confirm("Are you sure you want to clear this conversation?")) {
    chatHistory[activeUserId] = []; // Clears the array for the active user
    renderChat(activeUserId); // Re-renders the empty UI
  }
});

      // Mock Data for User Profiles
      const userData = {
        "1": { name: "Support Team", email: "support@neuroforge.com", bio: "Neuroforge official support. We are here to help you build the future.", lastOnline: "Online", status: "online" },
        "2": { name: "John Doe", email: "john.doe@design.co", bio: "Lead UI/UX Designer. Minimalist & Coffee enthusiast.", lastOnline: "Last seen at 10:42 AM", status: "offline" },
        "3": { name: "Alex Smith", email: "alex.smith@dev.io", bio: "Full-stack engineer. Building scalable systems.", lastOnline: "Last seen yesterday", status: "offline" }
      };

      const chatHistory = {
        "1": [
          { text: "Hello! Welcome to Neuroforge. How can we assist you today?", type: "received", time: "10:40 AM" },
          { text: "I need help integrating the new UI components.", type: "sent", time: "10:41 AM" }
        ],
        "2": [
          { text: "Hey! Did you check out the new Neuroforge dashboard?", type: "received", time: "09:15 AM" }
        ],
        "3": [
          { text: "The deployment is scheduled for 3 PM tomorrow.", type: "received", time: "Yesterday" }
        ]
      };

      const renderChat = (userId) => {
        chatMessages.innerHTML = '';
        chatHistory[userId].forEach(msg => {
          const div = document.createElement('div');
          div.className = `message ${msg.type} ${msg.type === 'sent' ? 'slide-left' : 'slide-right'}`;
          div.innerHTML = `<div class="bubble">${msg.text}</div><span class="timestamp">${msg.time}</span>`;
          chatMessages.appendChild(div);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
      };

      // Handle User Switching
      userItems.forEach(user => {
        user.addEventListener('click', () => {
          userItems.forEach(u => u.classList.remove('active'));
          user.classList.add('active');

          const userId = user.getAttribute('data-id');
          activeUserId = userId;
          
          // Update Header
          headerName.innerText = userData[userId].name;
          headerAvatar.src = user.querySelector('img').src;
          
          if(userData[userId].status === 'online') {
            headerStatus.innerText = "Online";
            headerStatus.classList.add('online');
          } else {
            headerStatus.innerText = "Offline";
            headerStatus.classList.remove('online');
          }

          renderChat(activeUserId);

          // For mobile: transition to chat view
          if(window.innerWidth <= 768) {
            chatWrapper.classList.add('mobile-chat-active');
          }
        });
      });

      // Mobile Back Button
      backBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Prevent opening the profile modal
        chatWrapper.classList.remove('mobile-chat-active');
      });

      // Handle Messaging
      const handleSend = () => {
        const text = messageInput.value.trim();
        if (!text) return;

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        chatHistory[activeUserId].push({ text, type: 'sent', time });
        
        renderChat(activeUserId);
        messageInput.value = '';

        // Simulate Reply
        typingIndicator.classList.add('active');
        chatMessages.scrollTop = chatMessages.scrollHeight;
        
        setTimeout(() => {
          typingIndicator.classList.remove('active');
          const reply = { text: "Acknowledged. Let me check that for you.", type: 'received', time: 'Just now' };
          chatHistory[activeUserId].push(reply);
          if(activeUserId === activeUserId) renderChat(activeUserId);
        }, 1500);
      };

      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

      // Profile Modal Logic
      profileTrigger.addEventListener('click', (e) => {
        if(e.target === backBtn || backBtn.contains(e.target)) return;
        
        const user = userData[activeUserId];
        document.getElementById('modal-img').src = headerAvatar.src;
        document.getElementById('modal-name').innerText = user.name;
        document.getElementById('modal-email').innerText = user.email;
        document.getElementById('modal-bio').innerText = user.bio;
        document.getElementById('modal-last-online').innerText = user.lastOnline;
        
        profileModal.classList.add('active');
      });

      closeProfileBtn.addEventListener('click', () => {
        profileModal.classList.remove('active');
      });

      // Close modal on outside click
      profileModal.addEventListener('click', (e) => {
        if (e.target === profileModal) {
          profileModal.classList.remove('active');
        }
      });

      renderChat("1"); // Initial Load
    });
  </script>
